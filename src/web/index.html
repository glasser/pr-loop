<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pr-loop web</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #656d76;
    --border: #d0d7de;
    --border-muted: #eaeef2;
    --accent: #0969da;
    --danger-bg: #ffebe9;
    --danger-fg: #cf222e;
    --ok-bg: #dafbe1;
    --ok-fg: #116329;
    --thread-bg: #f6f8fa;
    --claude-bg: #e6ebf1;
    --outdated: #ffd9a8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --muted: #8b949e;
      --border: #30363d;
      --border-muted: #21262d;
      --accent: #58a6ff;
      --danger-bg: #490202;
      --danger-fg: #ff7b72;
      --ok-bg: #033a16;
      --ok-fg: #7ee787;
      --thread-bg: #161b22;
      --claude-bg: #1d2430;
      --outdated: #553b1b;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  #connection-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--danger-bg);
    color: var(--danger-fg);
    padding: 8px 16px;
    font-weight: 600;
    text-align: center;
    z-index: 100;
    display: none;
    border-bottom: 1px solid var(--danger-fg);
  }
  #connection-banner.visible { display: block; }
  .banner-visible > #header { margin-top: 36px; }
  #header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  #header a { color: var(--accent); text-decoration: none; }
  #header a:hover { text-decoration: underline; }
  #header .meta {
    margin-left: auto;
    color: var(--muted);
    font-size: 12px;
  }
  #layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
    padding: 16px;
    max-width: 1600px;
    margin: 0 auto;
  }
  #threads { min-width: 0; }
  #commits-panel {
    position: sticky;
    top: 16px;
    align-self: start;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    background: var(--bg);
  }
  #commits-panel h2 {
    margin: 0 0 8px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .commit {
    padding: 8px 0;
    border-top: 1px solid var(--border-muted);
  }
  .commit:first-child { border-top: none; }
  .commit .title {
    font-weight: 500;
    color: var(--fg);
    text-decoration: none;
    display: block;
    line-height: 1.35;
  }
  .commit .title:hover { color: var(--accent); }
  .commit .meta {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  .commit .oid {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
  }
  .thread {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
    background: var(--bg);
    overflow: hidden;
  }
  .thread.outdated {
    border-left: 3px solid var(--outdated);
  }
  .thread-header {
    background: var(--thread-bg);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .thread-header .location {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--fg);
  }
  .thread-header .badge {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--outdated);
    color: var(--fg);
  }
  .thread-header .actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .thread-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .thread-body.no-diff { grid-template-columns: 1fr; }
  .thread-comments { padding: 12px; min-width: 0; }
  .thread-diff {
    border-left: 1px solid var(--border);
    padding: 12px;
    background: var(--thread-bg);
    overflow-x: auto;
    min-width: 0;
  }
  .thread-diff pre {
    margin: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    line-height: 1.45;
    white-space: pre;
  }
  .diff-add { background: rgba(35, 134, 54, 0.15); }
  .diff-del { background: rgba(248, 81, 73, 0.15); }
  .diff-hunk-header { color: var(--muted); }
  .comment {
    padding: 8px 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border-muted);
    border-radius: 4px;
  }
  .comment:last-child { border-bottom: none; margin-bottom: 0; }
  .comment.claude {
    background: var(--claude-bg);
    border-bottom-color: transparent;
  }
  /* github-markdown-css sets .markdown-body background to white by default —
     override so it inherits the surrounding comment's background. */
  .comment-body.markdown-body {
    background: transparent;
    color: inherit;
  }
  .comment-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    color: var(--muted);
    font-size: 12px;
  }
  .comment-meta .author { font-weight: 600; color: var(--fg); }
  .comment-meta .author .via { font-weight: 400; color: var(--muted); }
  .comment-meta a { color: var(--muted); text-decoration: none; }
  .comment-meta a:hover { color: var(--accent); text-decoration: underline; }
  .comment-body {
    font-size: 14px;
  }
  .comment-body pre {
    background: var(--thread-bg);
    padding: 8px;
    border-radius: 4px;
    overflow-x: auto;
  }
  .comment-body code {
    background: var(--thread-bg);
    padding: 1px 4px;
    border-radius: 3px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.9em;
  }
  .comment-body pre code { padding: 0; background: transparent; }
  .comment-body p:first-child { margin-top: 0; }
  .comment-body p:last-child { margin-bottom: 0; }
  button {
    font: inherit;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background: var(--thread-bg); }
  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  button.primary:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  button.spin::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: pr-spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: -1px;
  }
  @keyframes pr-spin { to { transform: rotate(360deg); } }
  .reply-box {
    padding: 12px;
    border-top: 1px solid var(--border-muted);
    background: var(--thread-bg);
  }
  .reply-box textarea {
    width: 100%;
    min-height: 60px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font: inherit;
    font-size: 13px;
    background: var(--bg);
    color: var(--fg);
    resize: vertical;
  }
  .reply-box .actions {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .reply-box .hint {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 48px 16px;
  }
  .empty .big { font-size: 32px; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10.22.0';
import { useState, useEffect } from 'https://esm.sh/preact@10.22.0/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
import MarkdownIt from 'https://esm.sh/markdown-it@14.1.0';
import { full as markdownItEmoji } from 'https://esm.sh/markdown-it-emoji@3.0.0';
import hljs from 'https://esm.sh/highlight.js@11.10.0';

const html = htm.bind(h);

const md = new MarkdownIt({ html: false, linkify: true, breaks: true });
md.use(markdownItEmoji);
const origFence = md.renderer.rules.fence || ((t, i, o, e, s) => s.renderToken(t, i, o));
md.renderer.rules.fence = (tokens, idx, options, env, self) => {
  const token = tokens[idx];
  const lang = (token.info || '').trim().split(/\s+/g)[0];
  if (lang && hljs.getLanguage(lang)) {
    try {
      const code = hljs.highlight(token.content, { language: lang, ignoreIllegals: true }).value;
      return `<pre><code class="hljs language-${lang}">${code}</code></pre>`;
    } catch (_) {}
  }
  return origFence(tokens, idx, options, env, self);
};

const CLAUDE_MARKER_RE = /^🤖 From Claude:\s?/;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );
}

function relativeTime(iso) {
  if (!iso) return '';
  const then = new Date(iso).getTime();
  const now = Date.now();
  const secs = Math.round((now - then) / 1000);
  if (secs < 0) return 'just now';
  if (secs < 60) return `${secs}s ago`;
  const mins = Math.round(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.round(hours / 24)}d ago`;
}

function renderDiffHtml(hunk) {
  const lines = hunk.split('\n');
  return '<pre>' + lines.map(l => {
    const cls = l.startsWith('+') && !l.startsWith('+++') ? 'diff-add'
      : l.startsWith('-') && !l.startsWith('---') ? 'diff-del'
      : l.startsWith('@@') ? 'diff-hunk-header' : '';
    return cls ? `<span class="${cls}">${escapeHtml(l)}</span>` : escapeHtml(l);
  }).join('\n') + '</pre>';
}

// Force periodic re-render for relative-time updates.
function useTick(intervalMs) {
  const [, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), intervalMs);
    return () => clearInterval(id);
  }, [intervalMs]);
}

function Comment({ c }) {
  const rawBody = c.body || '';
  const claudeMatch = rawBody.match(CLAUDE_MARKER_RE);
  const isClaude = !!claudeMatch;
  const displayBody = isClaude ? rawBody.slice(claudeMatch[0].length) : rawBody;
  const bodyHtml = md.render(displayBody);
  const ago = relativeTime(c.created_at);
  return html`
    <div class="comment ${isClaude ? 'claude' : ''}">
      <div class="comment-meta">
        <span class="author">
          ${isClaude
            ? html`🤖 Claude <span class="via">via @${c.author}</span>`
            : html`@${c.author}`}
        </span>
        <span>·</span>
        ${c.url
          ? html`<a href=${c.url} target="_blank">${ago || 'link'}</a>`
          : ago}
      </div>
      <div class="comment-body markdown-body" dangerouslySetInnerHTML=${{ __html: bodyHtml }}></div>
    </div>
  `;
}

function Thread({ thread, onPoke }) {
  const [reply, setReply] = useState('');
  const [posting, setPosting] = useState(false);
  const [resolving, setResolving] = useState(false);

  const diffHunk = thread.comments[0] && thread.comments[0].diff_hunk;
  const firstCommentUrl = thread.comments[0] && thread.comments[0].url;
  const location = thread.path
    ? (thread.line ? `${thread.path}:${thread.line}` : thread.path)
    : 'unknown location';

  async function doResolve() {
    setResolving(true);
    try {
      const res = await fetch(`/api/threads/${encodeURIComponent(thread.id)}/resolve`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      onPoke();
    } catch (e) {
      alert(`Failed to resolve: ${e.message}`);
      setResolving(false);
    }
  }

  async function doReply() {
    const body = reply.trim();
    if (!body) return;
    setPosting(true);
    try {
      const res = await fetch(`/api/threads/${encodeURIComponent(thread.id)}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setReply('');
      onPoke();
    } catch (e) {
      alert(`Failed to reply: ${e.message}`);
    } finally {
      setPosting(false);
    }
  }

  return html`
    <div class="thread ${thread.is_outdated ? 'outdated' : ''}">
      <div class="thread-header">
        ${firstCommentUrl
          ? html`<a class="location" href=${firstCommentUrl} target="_blank">${location}</a>`
          : html`<span class="location">${location}</span>`}
        ${thread.is_outdated && html`<span class="badge">outdated</span>`}
        <div class="actions">
          <button onClick=${doResolve} disabled=${resolving}>
            ${resolving ? 'Resolving…' : 'Resolve'}
          </button>
        </div>
      </div>
      <div class="thread-body ${diffHunk ? '' : 'no-diff'}">
        <div class="thread-comments">
          ${thread.comments.map(c => html`<${Comment} c=${c} key=${c.id} />`)}
        </div>
        ${diffHunk && html`<div class="thread-diff" dangerouslySetInnerHTML=${{ __html: renderDiffHtml(diffHunk) }}></div>`}
      </div>
      <div class="reply-box">
        <textarea
          placeholder="Reply as yourself…"
          value=${reply}
          onInput=${(e) => setReply(e.target.value)}
          onKeyDown=${(e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') doReply();
          }}
        ></textarea>
        <div class="actions">
          <button class=${'primary' + (posting ? ' spin' : '')} onClick=${doReply} disabled=${posting || !reply.trim()}>
            ${posting ? 'Posting…' : 'Reply'}
          </button>
          <span class="hint">Cmd/Ctrl+Enter</span>
        </div>
      </div>
    </div>
  `;
}

function Commit({ commit }) {
  const ago = relativeTime(commit.committed_date);
  const author = commit.author_login || commit.author_name || '';
  return html`
    <div class="commit">
      <a class="title" href=${commit.url} target="_blank">${commit.message_headline}</a>
      <div class="meta">
        <span class="oid">${commit.abbreviated_oid}</span>${author ? ' · ' + author : ''}${' · '}${ago}
      </div>
    </div>
  `;
}

function App() {
  const [data, setData] = useState(null);
  const [failures, setFailures] = useState(0);
  // Tick every 10s so relative times stay fresh even without a data change.
  useTick(10000);

  async function poll() {
    try {
      const res = await fetch('/api/state');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      setData(d);
      setFailures(0);
    } catch (_) {
      setFailures(f => f + 1);
    }
  }

  useEffect(() => {
    poll();
    const id = setInterval(poll, 1000);
    return () => clearInterval(id);
  }, []);

  if (!data) {
    return html`<div class="empty">Loading…</div>`;
  }

  const connectionLost = failures >= 3;
  const threads = (data.threads || []).filter(t => !t.is_resolved && !t.is_paperclip);

  const metaBits = [];
  if (data.last_fetched_at) metaBits.push(`last fetched ${relativeTime(data.last_fetched_at)}`);
  if (data.last_error) metaBits.push(`⚠ ${data.last_error}`);

  return html`
    <div id="connection-banner" class=${connectionLost ? 'visible' : ''}>
      ⚠ Lost connection to pr-loop server. Is it still running?
    </div>
    <div class=${connectionLost ? 'banner-visible' : ''}>
      <div id="header">
        <h1>${data.pr.owner}/${data.pr.repo} #${data.pr.pr_number}</h1>
        <div class="meta">${metaBits.join(' · ')}</div>
      </div>
      <div id="layout">
        <div id="threads">
          ${threads.length === 0
            ? html`<div class="empty"><div class="big">🎉</div>No unresolved review threads.</div>`
            : threads.map(t => html`<${Thread} thread=${t} onPoke=${poll} key=${t.id} />`)}
        </div>
        <div id="commits-panel">
          <h2>Commits</h2>
          <div id="commits">
            ${(data.commits || []).length === 0
              ? html`<div class="commit"><span class="meta">No commits</span></div>`
              : data.commits.map(c => html`<${Commit} commit=${c} key=${c.oid} />`)}
          </div>
        </div>
      </div>
    </div>
  `;
}

render(h(App), document.getElementById('root'));
</script>
</body>
</html>
