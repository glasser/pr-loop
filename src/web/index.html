<html lang="en">
<head>
<meta charset="utf-8">
<title>pr-loop web</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230969da'/><path d='M 12 6 A 11 11 0 1 0 20 6' fill='none' stroke='white' stroke-width='3' stroke-linecap='round'/><polygon points='17,2 25,6 19,10' fill='white'/></svg>">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #656d76;
    --border: #d0d7de;
    --border-muted: #eaeef2;
    --accent: #0969da;
    --danger-bg: #ffebe9;
    --danger-fg: #cf222e;
    --ok-bg: #dafbe1;
    --ok-fg: #116329;
    --thread-bg: #f6f8fa;
    --claude-bg: #e6ebf1;
    --outdated: #ffd9a8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --muted: #8b949e;
      --border: #30363d;
      --border-muted: #21262d;
      --accent: #58a6ff;
      --danger-bg: #490202;
      --danger-fg: #ff7b72;
      --ok-bg: #033a16;
      --ok-fg: #7ee787;
      --thread-bg: #161b22;
      --claude-bg: #1d2430;
      --outdated: #553b1b;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  #connection-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--danger-bg);
    color: var(--danger-fg);
    padding: 8px 16px;
    font-weight: 600;
    text-align: center;
    z-index: 100;
    display: none;
    border-bottom: 1px solid var(--danger-fg);
  }
  #connection-banner.visible { display: block; }
  .banner-visible > #header { margin-top: 36px; }
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
  }
  #cc-strip {
    padding: 6px 16px;
    background: var(--thread-bg);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  #cc-strip .row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  #cc-strip .row.last-text {
    margin-top: 2px;
    color: var(--muted);
    font-style: italic;
  }
  #cc-strip .last-text-body {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  #cc-strip .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: cc-pulse 1.4s ease-in-out infinite;
  }
  #cc-strip.thinking .dot {
    background: transparent;
    box-shadow: inset 0 0 0 2px var(--accent);
    animation: cc-pulse 1.4s ease-in-out infinite;
  }
  #cc-strip.idle .dot {
    background: var(--border);
    animation: none;
  }
  @keyframes cc-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  #cc-strip .tool {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--fg);
    font-weight: 600;
  }
  #cc-strip .preview {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  #cc-strip .spacer { flex: 1; }
  #cc-strip .sidechain {
    font-size: 10px;
    padding: 0 4px;

    background: var(--border-muted);
    color: var(--muted);

  #header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;

  #header h1 {

    font-size: 16px;

    align-items: baseline;

    text-overflow: ellipsis;
    white-space: nowrap;

  #header a { color: var(--accent); text-decoration: none; }

  #header .meta {

  #ci-strip {
    padding: 6px 16px;
    background: var(--bg);

    gap: 12px;

  #ci-strip .overall { font-weight: 600; }
  #ci-strip .overall.pass { color: var(--ok-fg); }
  #ci-strip .overall.fail { color: var(--danger-fg); }

  /* Mark the line actually being commented on (last non-header line in the

  .diff-target {

  #peers .header {

<body>
<div id="root"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10.22.0';
import { useState, useEffect, useLayoutEffect, useRef } from 'https://esm.sh/preact@10.22.0/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
import MarkdownIt from 'https://esm.sh/markdown-it@14.1.0';
import { full as markdownItEmoji } from 'https://esm.sh/markdown-it-emoji@3.0.0';
import hljs from 'https://esm.sh/highlight.js@11.10.0';

const html = htm.bind(h);

const md = new MarkdownIt({ html: false, linkify: true, breaks: true });
md.use(markdownItEmoji);
const origFence = md.renderer.rules.fence || ((t, i, o, e, s) => s.renderToken(t, i, o));
md.renderer.rules.fence = (tokens, idx, options, env, self) => {
  const token = tokens[idx];
  const lang = (token.info || '').trim().split(/\s+/g)[0];
  if (lang && hljs.getLanguage(lang)) {
    try {
      const code = hljs.highlight(token.content, { language: lang, ignoreIllegals: true }).value;
      return `<pre><code class="hljs language-${lang}">${code}</code></pre>`;
    } catch (_) {}
  }
  return origFence(tokens, idx, options, env, self);
};

const CLAUDE_MARKER_RE = /^🤖 From Claude:\s?/;

/// Sort threads so threads that have at least one Claude comment float to
/// the top (ordered by most-recent-Claude-comment, newest first), and
/// threads without any Claude comment come below (ordered by most-recent
/// comment, newest first). Missing timestamps sort last within each group.
function sortThreads(threads) {
  const keyed = threads.map(t => {
    let newestClaude = null;
    let newestAny = null;
    for (const c of t.comments || []) {
      const ts = c.created_at || null;
      if (ts) {
        if (!newestAny || ts > newestAny) newestAny = ts;
        if (c.body && CLAUDE_MARKER_RE.test(c.body)) {
          if (!newestClaude || ts > newestClaude) newestClaude = ts;
        }
      }
    }
    return { t, newestClaude, newestAny };
  });
  keyed.sort((a, b) => {
    // Claude-touched threads first.
    if (!!a.newestClaude !== !!b.newestClaude) {
      return a.newestClaude ? -1 : 1;
    }
    if (a.newestClaude && b.newestClaude) {
      return b.newestClaude.localeCompare(a.newestClaude);
    }
    // Neither has a Claude comment — sort by newest-overall, newest first.
    if (a.newestAny && b.newestAny) {
      return b.newestAny.localeCompare(a.newestAny);
    }
    if (a.newestAny) return -1;
    if (b.newestAny) return 1;
    return 0;
  });
  return keyed.map(k => k.t);
}

function relativeTime(iso) {
  if (!iso) return '';
  const then = new Date(iso).getTime();
  const now = Date.now();
  const secs = Math.round((now - then) / 1000);
  if (secs < 0) return 'just now';
  if (secs < 60) return `${secs}s ago`;
  const mins = Math.round(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.round(hours / 24)}d ago`;
}

// Elapsed duration without the "ago" suffix, for things that are still running.
function elapsed(iso) {
  if (!iso) return '';
  const then = new Date(iso).getTime();
  const now = Date.now();
  const secs = Math.max(0, Math.round((now - then) / 1000));
  if (secs < 60) return `${secs}s`;
  const mins = Math.round(secs / 60);
  if (mins < 60) return `${mins}m`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours}h`;
  return `${Math.round(hours / 24)}d`;
}

function DiffHunk({ hunk }) {
  const lines = hunk.split('\n');
  // Last non-empty, non-hunk-header line is the commented line (GitHub convention).
  let targetIdx = -1;
  for (let i = lines.length - 1; i >= 0; i--) {
    const l = lines[i];
    if (l.trim() !== '' && !l.startsWith('@@')) { targetIdx = i; break; }
  }
  return html`<pre>${lines.map((l, i) => {
    let cls = null;
    if (l.startsWith('+') && !l.startsWith('+++')) cls = 'diff-add';
    else if (l.startsWith('-') && !l.startsWith('---')) cls = 'diff-del';
    else if (l.startsWith('@@')) cls = 'diff-hunk-header';
    if (i === targetIdx) cls = (cls ? cls + ' ' : '') + 'diff-target';
    const sep = i < lines.length - 1 ? '\n' : '';
    return cls
      ? html`<span class=${cls}>${l}</span>${sep}`
      : html`${l}${sep}`;
  })}</pre>`;
}

// Compute the URL that a peer card should link to. When the page is being
// served through the hub proxy (path starts with /pr/), link to the peer via
// the proxy so the user stays on the hub's single URL. Otherwise, link
// directly to the peer's http://127.0.0.1:<port>/ as the server reports it.
function peerHref(peer) {
  if (window.location.pathname.startsWith('/pr/')) {
    return `/pr/${peer.pr_owner}/${peer.pr_repo}/${peer.pr_number}/`;
  }
  return peer.url;
}

// Force periodic re-render for relative-time updates.
function useTick(intervalMs) {
  const [, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), intervalMs);
    return () => clearInterval(id);
  }, [intervalMs]);
}

function Comment({ c }) {
  const rawBody = c.body || '';
  const claudeMatch = rawBody.match(CLAUDE_MARKER_RE);
  const isClaude = !!claudeMatch;
  const displayBody = isClaude ? rawBody.slice(claudeMatch[0].length) : rawBody;
  const bodyHtml = md.render(displayBody);
  const ago = relativeTime(c.created_at);
  return html`
    <div class="comment ${isClaude ? 'claude' : ''}">
      <div class="comment-meta">
        <span class="author">
          ${isClaude
            ? html`🤖 Claude <span class="via">via @${c.author}</span>`
            : html`@${c.author}`}
        </span>
        <span>·</span>
        ${c.url
          ? html`<a href=${c.url} target="_blank">${ago || 'link'}</a>`
          : ago}
      </div>
      <div class="comment-body markdown-body" dangerouslySetInnerHTML=${{ __html: bodyHtml }}></div>
    </div>
  `;
}

function Thread({ thread, onPoke }) {
  const [reply, setReply] = useState('');
  const [posting, setPosting] = useState(false);
  const [resolving, setResolving] = useState(false);
  const [collapsed, setCollapsed] = useState(false);

  const diffHunk = thread.comments[0] && thread.comments[0].diff_hunk;
  const firstCommentUrl = thread.comments[0] && thread.comments[0].url;
  const location = thread.path
    ? (thread.line ? `${thread.path}:${thread.line}` : thread.path)
    : 'unknown location';

  async function doResolve() {
    setResolving(true);
    // Collapse immediately for a snappier UI; the thread will usually
    // disappear entirely once the resolve settles and the poll returns
    // fresh state. If resolve fails, we uncollapse below.
    setCollapsed(true);
    try {
      const res = await fetch(`api/threads/${encodeURIComponent(thread.id)}/resolve`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      onPoke();
    } catch (e) {
      alert(`Failed to resolve: ${e.message}`);
      setResolving(false);
      setCollapsed(false);
    }
  }

  async function doReply() {
    const body = reply.trim();
    if (!body) return;
    setPosting(true);
    try {
      const res = await fetch(`api/threads/${encodeURIComponent(thread.id)}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setReply('');
      onPoke();
    } catch (e) {
      alert(`Failed to reply: ${e.message}`);
    } finally {
      setPosting(false);
    }
  }

  return html`
    <div class=${'thread' + (thread.is_outdated ? ' outdated' : '') + (collapsed ? ' collapsed' : '')}>
      <div class="thread-header">
        <span
          class="chevron"
          role="button"
          title=${collapsed ? 'Expand' : 'Collapse'}
          onClick=${() => setCollapsed(c => !c)}
        >${collapsed ? '▸' : '▾'}</span>
        ${firstCommentUrl
          ? html`<a class="location" href=${firstCommentUrl} target="_blank">${location}</a>`
          : html`<span class="location">${location}</span>`}
        ${thread.is_outdated && html`<span class="badge">outdated</span>`}
        <div class="actions">
          <button onClick=${doResolve} disabled=${resolving}>
            ${resolving ? 'Resolving…' : 'Resolve'}
          </button>
        </div>
      </div>
      <div class="thread-body ${diffHunk ? '' : 'no-diff'}">
        <div class="thread-left">
          <div class="thread-comments">
            ${thread.comments.map(c => html`<${Comment} c=${c} key=${c.id} />`)}
          </div>
          <div class="reply-box">
            <textarea
              placeholder="Reply as yourself…"
              value=${reply}
              onInput=${(e) => setReply(e.target.value)}
              onKeyDown=${(e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') doReply();
              }}
            ></textarea>
            <div class="actions">
              <button class=${'primary' + (posting ? ' spin' : '')} onClick=${doReply} disabled=${posting || !reply.trim()}>
                ${posting ? 'Posting…' : 'Reply'}
              </button>
              <span class="hint">Cmd/Ctrl+Enter</span>
            </div>
          </div>
        </div>
        ${diffHunk && html`<div class="thread-diff"><${DiffHunk} hunk=${diffHunk} /></div>`}
      </div>
    </div>
  `;
}

function CiStrip({ checks }) {
  if (!checks || checks.length === 0) return null;
  const counts = { pass: 0, fail: 0, pending: 0, skipping: 0, cancelled: 0 };
  for (const c of checks) counts[c.status] = (counts[c.status] || 0) + 1;
  const overallClass =
    counts.fail > 0 ? 'fail' :
    counts.pending > 0 ? 'pending' : 'pass';
  const overallLabel =
    counts.fail > 0 ? `${counts.fail} failed` :
    counts.pending > 0 ? `${counts.pending} pending` :
    'all passing';

  const summaryBits = [];
  if (counts.pass > 0) summaryBits.push(`✓ ${counts.pass} passed`);
  if (counts.fail > 0) summaryBits.push(`✗ ${counts.fail} failed`);
  if (counts.pending > 0) summaryBits.push(`○ ${counts.pending} pending`);
  if (counts.skipping > 0) summaryBits.push(`⊘ ${counts.skipping} skipped`);
  if (counts.cancelled > 0) summaryBits.push(`⊘ ${counts.cancelled} cancelled`);

  // Order checks: failed first, then pending, then the rest alphabetically.
  const order = { fail: 0, pending: 1, pass: 2, cancelled: 3, skipping: 4 };
  const sorted = [...checks].sort((a, b) =>
    (order[a.status] ?? 9) - (order[b.status] ?? 9) || a.name.localeCompare(b.name)
  );

  const glyphFor = (status) => ({
    pass: '✓',
    fail: '✗',
    pending: '○',
    skipping: '⊘',
    cancelled: '⊘',
  }[status] || '?');

  return html`
    <div id="ci-strip">
      <span>CI:</span>
      <span class=${'overall ' + overallClass}>${overallLabel}</span>
      <span>· ${summaryBits.join(' · ')}</span>
      <details>
        <summary>details</summary>
        <div class="check-list">
          ${sorted.map(c => html`
            <div class=${'check ' + c.status} key=${c.name}>
              <span class="glyph">${glyphFor(c.status)}</span>
              ${c.url
                ? html`<a href=${c.url} target="_blank">${c.name}</a>`
                : html`<span>${c.name}</span>`}
            </div>
          `)}
        </div>
      </details>
    </div>
  `;
}

function CcStrip({ status }) {
  if (!status) {
    return html`
      <div id="cc-strip" class="idle">
        <div class="row">
          <span class="dot"></span>
          <span>Claude Code: no transcript detected in this directory</span>
        </div>
      </div>
    `;
  }
  const activity = status.activity || (status.in_flight && status.in_flight.length ? 'running' : 'idle');
  const lastActivity = status.last_activity_at ? relativeTime(status.last_activity_at) : null;
  const lastText = status.last_assistant_text;
  const lastTextRow = lastText
    ? html`<div class="row last-text">
             <span class="last-text-body" title=${lastText}>“${lastText}”</span>
           </div>`
    : null;

  if (activity === 'running') {
    const tools = status.in_flight || [];
    // Show primary tool (most recent) + any others as a count.
    const primary = tools[tools.length - 1];
    const others = tools.length - 1;
    const runningFor = elapsed(primary.started_at);
    return html`
      <div id="cc-strip" class="running">
        <div class="row">
          <span class="dot"></span>
          <span>Claude Code <b>running</b></span>
          <span class="tool">${primary.name}</span>
          ${primary.is_sidechain && html`<span class="sidechain">subagent</span>`}
          ${primary.preview && html`<span class="preview" title=${primary.preview}>${primary.preview}</span>`}
          <span class="spacer"></span>
          <span>for ${runningFor}${others > 0 ? ` · +${others} more` : ''}</span>
        </div>
        ${lastTextRow}
      </div>
    `;
  }

  const last = status.last_completed_tool;
  const lastToolBits = last
    ? html` <span class="spacer"></span>
            <span>last: <span class="tool">${last.name}</span>${last.preview ? html` ${last.preview}` : ''}</span>`
    : null;

  if (activity === 'thinking') {
    return html`
      <div id="cc-strip" class="thinking">
        <div class="row">
          <span class="dot"></span>
          <span>Claude Code <b>thinking</b>…${lastActivity ? ` (${lastActivity})` : ''}</span>
          ${lastToolBits}
        </div>
        ${lastTextRow}
      </div>
    `;
  }

  // idle
  return html`
    <div id="cc-strip" class="idle">
      <div class="row">
        <span class="dot"></span>
        <span>Claude Code <b>idle</b>${lastActivity ? ` — last activity ${lastActivity}` : ''}</span>
        ${lastToolBits}
      </div>
      ${lastTextRow}
    </div>
  `;
}

function Commit({ commit, isNew, onDismiss }) {
  const ago = relativeTime(commit.committed_date);
  const author = commit.author_login || commit.author_name || '';
  const dismiss = () => { if (isNew) onDismiss(commit.sha); };
  return html`
    <div class=${'commit' + (isNew ? ' new' : '')}>
      <a class="title" href=${commit.url} target="_blank"
         onClick=${dismiss} onAuxClick=${dismiss}>
        ${commit.message_headline}
      </a>
      <div class="meta">
        <span class="sha">${commit.abbreviated_sha}</span>${author ? ' · ' + author : ''}${' · '}${ago}
      </div>
    </div>
  `;
}

function PeersWidget() {
  const [peers, setPeers] = useState([]);
  const [collapsed, setCollapsed] = useState(false);
  useTick(10000);

  useEffect(() => {
    async function poll() {
      try {
        const r = await fetch('api/peers');
        if (!r.ok) return;
        setPeers(await r.json());
      } catch (_) {}
    }
    poll();
    const id = setInterval(poll, 5000);
    return () => clearInterval(id);
  }, []);

  if (!peers || peers.length === 0) return null;

  return html`
    <div id="peers">
      <div class="header">
        <span>${peers.length} other pr-loop${peers.length === 1 ? '' : 's'}</span>
        <button onClick=${() => setCollapsed(c => !c)}>
          ${collapsed ? 'show' : 'hide'}
        </button>
      </div>
      ${!collapsed && peers.map(p => html`
        <a class="peer" href=${peerHref(p)} key=${p.port}>
          <div class="pr-line">
            <span class="num">${p.pr_owner}/${p.pr_repo} #${p.pr_number}</span>
            <span class="title">${p.pr_title || ''}</span>
          </div>
          <div class="counts">
            ${p.needs_response > 0
              ? html`<span class="attn">${p.needs_response} need${p.needs_response === 1 ? 's' : ''} reply</span>`
              : html`<span>no unaddressed comments</span>`}
            ${p.unresolved_threads > 0 ? html` · ${p.unresolved_threads} unresolved` : ''}
          </div>
          <div class="times">
            ${p.last_commit_at ? html`commit ${relativeTime(p.last_commit_at)}` : 'no commits'}
            ${p.last_comment_at ? html` · comment ${relativeTime(p.last_comment_at)}` : ''}
          </div>
        </a>
      `)}
    </div>
  `;
}

function App() {
  const [data, setData] = useState(null);
  const [failures, setFailures] = useState(0);
  // Commits present on first data load — anything seen after is "new".
  const seenCommitShas = useRef(null);
  const [newCommitShas, setNewCommitShas] = useState(() => new Set());
  // Tick every 10s so relative times stay fresh even without a data change.
  useTick(10000);

  // Measure the sticky top-bar's actual height into a CSS variable so
  // sticky thread headers can stack correctly below it. Runs after every
  // render so it stays accurate as the CC strip's content changes size.
  const topBarRef = useRef(null);
  useLayoutEffect(() => {
    const el = topBarRef.current;
    if (!el) return;
    const h = el.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--top-bar-height', `${h}px`);
  });

  async function poll() {
    try {
      const res = await fetch('api/state');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      setData(d);
      setFailures(0);
    } catch (_) {
      setFailures(f => f + 1);
    }
  }

  useEffect(() => {
    poll();
    const id = setInterval(poll, 1000);
    return () => clearInterval(id);
  }, []);

  // Keep the browser tab title in sync with the PR.
  useEffect(() => {
    if (!data || !data.pr) return;
    const pr = data.pr;
    document.title = pr.title
      ? `${pr.title} #${pr.pr_number}`
      : `${pr.owner}/${pr.repo} #${pr.pr_number}`;
  }, [data && data.pr && data.pr.title, data && data.pr && data.pr.pr_number]);

  // Track freshly-arrived commits. Wait for the server's first successful
  // GitHub fetch (last_fetched_at populated) before baselining — otherwise
  // the first poll may see an empty commits list and then flag everything
  // as "new" when the real fetch completes.
  useEffect(() => {
    if (!data || !data.last_fetched_at) return;
    const shas = (data.commits || []).map(c => c.sha);
    if (seenCommitShas.current === null) {
      seenCommitShas.current = new Set(shas);
      return;
    }
    const toAdd = shas.filter(s => !seenCommitShas.current.has(s));
    if (toAdd.length) {
      setNewCommitShas(prev => {
        const next = new Set(prev);
        toAdd.forEach(s => next.add(s));
        return next;
      });
    }
  }, [data]);

  // Dismiss a new-commit highlight. Also mark the SHA as seen so the next
  // poll's diff doesn't treat it as new again.
  const dismissCommit = (sha) => {
    if (seenCommitShas.current) seenCommitShas.current.add(sha);
    setNewCommitShas(prev => {
      if (!prev.has(sha)) return prev;
      const next = new Set(prev);
      next.delete(sha);
      return next;
    });
  };

  if (!data) {
    return html`<div class="empty">Loading…</div>`;
  }

  const connectionLost = failures >= 3;
  const threads = sortThreads(
    (data.threads || []).filter(t => !t.is_resolved && !t.is_paperclip)
  );

  const metaBits = [];
  if (data.last_fetched_at) metaBits.push(`GitHub synced ${relativeTime(data.last_fetched_at)}`);
  if (data.last_error) metaBits.push(`⚠ ${data.last_error}`);

  return html`
    <div id="connection-banner" class=${connectionLost ? 'visible' : ''}>
      ⚠ Lost connection to pr-loop server. Is it still running?
    </div>
    <div class=${connectionLost ? 'banner-visible' : ''}>
      <div class="top-bar" ref=${topBarRef}>
        <${CcStrip} status=${data.cc_status} />
        <div id="header">
          <h1>
            ${data.pr.url
              ? html`<a href=${data.pr.url} target="_blank">${data.pr.owner}/${data.pr.repo} #${data.pr.pr_number}</a>`
              : html`${data.pr.owner}/${data.pr.repo} #${data.pr.pr_number}`}
            ${data.pr.title && html`<span class="pr-title">${data.pr.title}</span>`}
          </h1>
          <div class="meta">${metaBits.join(' · ')}</div>
        </div>
        <${CiStrip} checks=${data.checks} />
      </div>
      <div id="layout">
        <div id="threads">
          ${threads.length > 0
            ? threads.map(t => html`<${Thread} thread=${t} onPoke=${poll} key=${t.id} />`)
            : !data.last_fetched_at
              ? html`<div class="empty">Waiting for first GitHub fetch…</div>`
              : html`<div class="empty"><div class="big">🎉</div>No unresolved review threads.</div>`}
        </div>
        <div id="commits-panel">
          <h2>Commits</h2>
          <div id="commits">
            ${(data.commits || []).length === 0
              ? html`<div class="commit"><span class="meta">No commits</span></div>`
              : data.commits.map(c => html`<${Commit}
                  commit=${c}
                  isNew=${newCommitShas.has(c.sha)}
                  onDismiss=${dismissCommit}
                  key=${c.sha}
                />`)}
          </div>
        </div>
      </div>
      <${PeersWidget} />
    </div>
  `;
}

render(h(App), document.getElementById('root'));
</script>
</body>
</html>
